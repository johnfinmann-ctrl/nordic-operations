<!DOCTYPE html>
<html lang="da" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitale værktøjer | Nordic Operations</title>
  <meta name="description" content="Specialudviklede digitale værktøjer og beslutningsstøtte skræddersyet til jeres flaskehalse.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/core.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <header class="site-header"><nav id="site-nav"></nav></header>

  <main>
    <section class="hero" style="padding-bottom:var(--space-4);">
      <div class="container">
        <div class="eyebrow">Løsninger — Digitale værktøjer</div>
        <h1>Hvordan ser regnestykket bag jeres næste beslutning ud?</h1>
        <p class="lead">Skræddersyede beregnere og beslutningsværktøjer, der giver jer et klart svar — ikke bare et skøn.</p>
      </div>
    </section>

    <section style="padding-top:0;">
      <div class="container">
        <div class="grid grid-3" id="tool-products"></div>
      </div>
    </section>

    <section class="text-center">
      <div class="container">
        <h2 style="margin-bottom:0.5rem;">Mangler I et værktøj til en konkret beslutning?</h2>
        <a class="btn btn-primary" href="kontakt.html?solution=vaerktojer">Kontakt os</a>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="../api/supabase.config.js"></script>

  <script src="../api/data-source.js"></script>

  <script src="../js/app.js"></script>

  <script src="../components/install-prompt.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/footer.js"></script>
  <script>
    NordicPlatform.init(function () {
      window.NordicPlatform.getProducts().then(function (products) {
        var esc = NordicPlatform.escapeHTML;
        var tools = products.filter(function (p) { return p.category === 'AI & Beslutningsværktøjer'; });
        document.getElementById('tool-products').innerHTML = tools.map(function (p) {
          return '<a class="card" href="produkt.html?id=' + esc(p.id) + '">' +
            '<div class="icon">' + esc(p.icon) + '</div>' +
            '<h3>' + esc(p.name) + '</h3>' +
            '<p style="margin:0;">' + esc(p.tagline) + '</p>' +
          '</a>';
        }).join('');
      });
    });
  </script>
</body>
</html>
