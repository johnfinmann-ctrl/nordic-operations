<!DOCTYPE html>
<html lang="da" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cases | Nordic Operations</title>
  <meta name="description" content="Udvalgte cases fra Nordic Operations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/core.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <header class="site-header"><nav id="site-nav"></nav></header>

  <main>
    <section class="hero" style="padding-bottom:var(--space-4);">
      <div class="container">
        <div class="eyebrow">Projekter</div>
        <h1>Udvalgte cases</h1>
      </div>
    </section>
    <section style="padding-top:0;">
      <div class="container">
        <div class="grid grid-3" id="case-grid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="../js/app.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/footer.js"></script>
  <script>
    NordicPlatform.init(function () {
      window.NordicPlatform.getCases().then(function (cases) {
        var esc = NordicPlatform.escapeHTML;
        document.getElementById('case-grid').innerHTML = cases.map(function (c) {
          return '<div class="card">' +
            '<span class="badge status-' + esc(c.status) + '"><span class="badge-dot"></span>' + esc(c.statusLabel) + '</span>' +
            '<h3 style="margin-top:0.75rem;">' + esc(c.name) + '</h3>' +
            '<p>' + esc(c.description) + '</p>' +
          '</div>';
        }).join('');
      });
    });
  </script>
</body>
</html>
