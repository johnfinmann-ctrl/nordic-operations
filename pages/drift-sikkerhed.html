<!DOCTYPE html>
<html lang="da" data-root="../">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift & Sikkerhed | Nordic Operations</title>
  <meta name="description" content="Vores dedikerede fagportal med fokus på hosting, backup, sikkerhed og europæisk compliance.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/core.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <header class="site-header"><nav id="site-nav"></nav></header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="eyebrow">Specialiseret portal</div>
        <h1>Drift & Sikkerhed</h1>
        <p class="lead">Vores dedikerede fagportal med dybdegående fokus på hosting, backup, monitorering og fuld europæisk compliance — NIS2, GDPR, AI Act og Cyber Resilience Act.</p>
        <div class="btn-row">
          <a class="btn btn-primary" href="https://driftogsikkerhed.dk" target="_blank" rel="noopener">Besøg portalen →</a>
          <a class="btn btn-secondary" href="kontakt.html?solution=drift">Book en samtale</a>
        </div>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="section-header">
          <div class="eyebrow">Fokusområder</div>
          <h2>Enterprise compliance & pålidelighed</h2>
        </div>
        <div class="grid grid-4" id="compliance-grid"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="../api/supabase.config.js"></script>

  <script src="../api/data-source.js"></script>

  <script src="../js/app.js"></script>

  <script src="../components/install-prompt.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/footer.js"></script>
  <script>
    NordicPlatform.init(function (config) {
      var esc = NordicPlatform.escapeHTML;
      document.getElementById('compliance-grid').innerHTML = config.compliance.map(function (c) {
        return '<div class="card text-center"><h3>' + esc(c.label) + '</h3></div>';
      }).join('');
    });
  </script>
</body>
</html>
